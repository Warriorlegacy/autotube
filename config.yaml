pipeline:
  target_video_duration_minutes: 5
  max_retries: 3
  retry_delay_base_seconds: 30
  privacy_status: "public"
  review_before_upload: false
  review_timeout_hours: 24

content:
  niche: "general_knowledge"
  script_style: "educational"
  language: "en"
  min_script_words: 400
  max_script_words: 1200

ai:
  primary_provider: "gemini"
  fallback_providers:
    - "groq"
  gemini_model: "gemini-2.0-flash"
  groq_model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_output_tokens: 2048

tts:
  voice: "en-IN-NeerjaNeural"
  rate: "+0%"
  volume: "+0%"

media:
  prefer_video_clips: true
  fallback_to_images: true
  min_clip_duration_seconds: 5
  max_clip_duration_seconds: 30
  download_timeout_seconds: 30

video:
  resolution: "1920x1080"
  fps: 30
  codec: "libx264"
  audio_codec: "aac"
  background_music_volume: 0.20
  subtitle_enabled: true
  subtitle_font_size: 36
  subtitle_font_color: "white"

thumbnail:
  template: "bold_text"
  font_path: "./assets/fonts/Montserrat-Bold.ttf"
  overlay_opacity: 0.55
  output_quality: 95

youtube:
  category_id: 27
  default_language: "en"
  made_for_kids: false
  daily_quota_limit: 10000
  quota_alert_threshold: 8000

qa:
  min_duration_seconds: 180
  max_duration_seconds: 900
  max_file_size_mb: 256
  min_file_size_mb: 1.0
  blacklisted_keywords:
    - "violence"
    - "hate"
    - "spam"
    - "fake"
    - "scam"

notifications:
  telegram_enabled: true
  alert_on:
    - "failure"
    - "upload_success"
    - "quota_alert"
    - "queue_empty"
    - "weekly_summary"
  weekly_summary_day: "Sunday"
  weekly_summary_hour: 10

cleanup:
  delete_local_files_after_upload: true
  keep_logs_days: 90
